name: deckServer

services:
  postgres:
    image: postgres:16-alpine
    container_name: polodeck-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-polodeck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polodeck}
      POSTGRES_DB: ${POSTGRES_DB:-polodeck}
    ports:
      - "5432:5432"
    volumes:
      - polodeck-postgres-data:/var/lib/postgresql/data
    networks:
      - polodeck

  polodeck-app:
    build: ./server
    container_name: polodeck-app
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-polodeck}:${POSTGRES_PASSWORD:-polodeck}@postgres:5432/${POSTGRES_DB:-polodeck}?schema=public
    ports:
      # Use POLODECK_BIND_ADDRESS=0.0.0.0 so Pis and other PCs on the LAN can reach the API and Socket.IO.
      - "${POLODECK_BIND_ADDRESS:-127.0.0.1}:3000:3000"
    command: ["node", "dist/server.js"]
    networks:
      - polodeck

  ui:
    build:
      context: ./ui
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3000}
    container_name: polodeck-ui
    depends_on:
      - polodeck-app
    ports:
      - "${POLODECK_BIND_ADDRESS:-127.0.0.1}:8080:80"
    networks:
      - polodeck

  # Arena scoreboard / timer / shot clock static UI (optional). Enable with: docker compose --profile arena up -d
  arena-ui:
    profiles: ["arena"]
    build:
      context: ./clients/arena
      args:
        VITE_DEFAULT_SERVER: ${VITE_DEFAULT_SERVER:-http://localhost:3000}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3000}
    container_name: polodeck-arena-ui
    depends_on:
      - polodeck-app
    ports:
      - "${POLODECK_BIND_ADDRESS:-127.0.0.1}:8090:80"
    networks:
      - polodeck

volumes:
  polodeck-postgres-data:

networks:
  polodeck:
    driver: bridge
