server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /timer {
        return 302 /timer.html;
    }

    location = /shot-clock {
        return 302 /shot-clock.html;
    }
}
