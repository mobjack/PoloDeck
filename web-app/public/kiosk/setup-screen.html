<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PoloDeck — Kiosk setup</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1419;
        --fg: #e8eef4;
        --muted: #8b9aab;
        --accent: #3d9cf0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      main {
        max-width: 36rem;
        text-align: center;
      }
      h1 {
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 600;
        margin: 0 0 0.75rem;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0.5rem 0;
        line-height: 1.55;
        color: var(--muted);
        font-size: 1.05rem;
      }
      .ok {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1.5rem;
        padding: 0.65rem 1.1rem;
        border-radius: 999px;
        background: rgba(61, 156, 240, 0.15);
        color: var(--accent);
        font-weight: 500;
        font-size: 0.95rem;
      }
      code {
        font-size: 0.9em;
        background: rgba(255, 255, 255, 0.06);
        padding: 0.15em 0.45em;
        border-radius: 0.25rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PoloDeck kiosk is online</h1>
      <p>
        This Pi reached the PoloDeck web server and loaded the setup screen. Use the main web app to
        pick games and open display links from <code>/kiosk</code>.
      </p>
      <p class="ok" aria-live="polite">Network and kiosk path OK</p>
    </main>
  </body>
</html>
